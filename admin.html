<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>管理者画面 - ウマサバ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1>🛠 管理者パネル</h1>
    <input type="text" id="horse-name" placeholder="馬の名前を入力" />
    <button id="add-btn">馬を登録する</button>
    <hr />
    <div id="admin-list"></div>
    <button onclick="location.href = 'index.html'">投票画面へ戻る</button>

    <script type="module">
      // --- ログインチェック：管理者（admin）以外は追い返す ---
      if (sessionStorage.getItem("auth_role") !== "admin") {
        alert("管理者権限が必要です。ログインし直してください。");
        window.location.href = "login.html";
      }

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      // Firebaseの設定（index.htmlと同じものを貼り付け）
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "umasaba-odds.firebaseapp.com",
        databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
        projectId: "umasaba-odds",
        storageBucket: "umasaba-odds.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // 馬の追加
      document.getElementById("add-btn").onclick = () => {
        const name = document.getElementById("horse-name").value;
        if (name) {
          const newHorseRef = push(ref(db, "horses"));
          set(newHorseRef, { name: name, votes: 0 });
          document.getElementById("horse-name").value = "";
        }
      };

      // 馬の削除用リスト表示
      onValue(ref(db, "horses"), (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById("admin-list");
        list.innerHTML = "";
        for (let id in data) {
          const div = document.createElement("div");
          div.innerHTML = `${data[id].name} <button onclick="deleteHorse('${id}')">削除</button>`;
          list.appendChild(div);
        }
      });

      // 削除関数をグローバルに公開
      window.deleteHorse = (id) => {
        if (confirm("本当に削除しますか？")) {
          remove(ref(db, `horses/${id}`));
        }
      };
    </script>
  </body>
</html>
