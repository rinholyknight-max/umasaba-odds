<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理者画面 - うまさば</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">管理パネル</span>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <ul class="l-menu__list">
        <li class="l-menu__item"><a href="index.html" class="l-menu__link">投票画面</a></li>
        <li class="l-menu__item"><a href="odds.html" class="l-menu__link">オッズ確認</a></li>
        <li class="l-menu__item"><a href="admin.html" class="l-menu__link">管理者画面</a></li>
        <li class="l-menu__item"><button id="js-logout" class="l-menu__link">ログアウト</button></li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-admin">
      <h1 class="p-admin__title">出走登録</h1>

      <section class="p-admin__register">
        <div class="p-admin__register-group">
          <input type="text" id="horse-name" class="c-input" placeholder="登録キャラ名" list="master-chars" autocomplete="off" />
          <datalist id="master-chars"></datalist>
          <input type="text" id="user-name" class="c-input" placeholder="ユーザー名" autocomplete="off" />
          <button id="add-btn" class="c-button c-button--primary">登録</button>
        </div>
      </section>

      <div class="p-admin__upload" style="margin: 20px 0; padding: 15px; border: 1px dashed #ccc">
        <p style="font-size: 0.9rem; margin-bottom: 10px">CSVまたはテキストファイルで一括登録</p>
        <input type="file" id="js-upload-file" accept=".txt,.csv" />
        <p style="font-size: 0.8rem; color: #666">形式: キャラ名,ユーザー名 (1行に1人)</p>
      </div>

      <div class="p-admin__danger-zone">
        <button id="js-reset-votes" class="c-button c-button--danger">投票データのみリセット</button>
        <button id="js-reset-horses" class="c-button c-button--danger" style="margin-top: 10px">出走表を全削除</button>
      </div>

      <div id="admin-list" class="p-admin__list"></div>
    </main>

    <script type="module">
      import { checkAuth, logout } from "./js/auth.js";
      import { initMenu } from "./js/menu.js";

      // SDKバージョン 12.11.0
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

      if (checkAuth("admin")) {
        initMenu();
        document.getElementById("js-logout").onclick = logout;

        const firebaseConfig = {
          apiKey: "AIzaSyBp5Cg6A3v3VZal-orAiwFjphKIDYx9ATo",
          authDomain: "umasaba-odds.firebaseapp.com",
          databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
          projectId: "umasaba-odds",
          storageBucket: "umasaba-odds.firebasestorage.app",
          messagingSenderId: "802834774249",
          appId: "1:802834774249:web:5623185854ead82c261878",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const charInput = document.getElementById("horse-name");
        const userInput = document.getElementById("user-name");
        const addBtn = document.getElementById("add-btn");

        // 1. 登録処理
        addBtn.onclick = () => {
          const hName = charInput.value.trim();
          const uName = userInput.value.trim();
          if (hName && uName) {
            push(ref(db, "horses"), {
              horseName: hName,
              userName: uName,
              votes: 0,
            }).then(() => {
              charInput.value = "";
              userInput.value = "";
              charInput.focus();
            });
          }
        };

        // --- 一括登録機能 (テキストファイル読み込み) ---
        const fileInput = document.getElementById("js-upload-file");

        fileInput.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = async (event) => {
            const content = event.target.result;
            const lines = content.split(/\r?\n/); // 行ごとに分割
            let count = 0;

            for (let line of lines) {
              // カンマ、またはスペースで分割
              const [hName, uName] = line.split(/[,,、\s]+/).map((s) => s.trim());

              if (hName && uName) {
                try {
                  await push(ref(db, "horses"), {
                    horseName: hName,
                    userName: uName,
                    votes: 0,
                  });
                  count++;
                } catch (err) {
                  console.error("登録エラー:", err);
                }
              }
            }

            alert(`${count}件のキャラクターを登録しました！`);
            fileInput.value = ""; // 入力をリセット
          };

          reader.readAsText(file);
        };

        // 2. リスト表示と個別削除
        onValue(ref(db, "horses"), (snapshot) => {
          const data = snapshot.val();
          const list = document.getElementById("admin-list");
          list.innerHTML = "";
          if (!data) return;

          for (let id in data) {
            const item = document.createElement("div");
            item.className = "p-admin__item";
            item.innerHTML = `
          <div class="p-admin__info">
            <span style="display:block; font-weight:bold;">${data[id].horseName}</span>
            <small>ユーザー: ${data[id].userName}</small>
          </div>
          <button class="c-button c-button--danger js-delete-btn" data-id="${id}">削除</button>
        `;
            list.appendChild(item);
          }

          document.querySelectorAll(".js-delete-btn").forEach((btn) => {
            btn.onclick = () => {
              if (confirm("このキャラを削除しますか？")) {
                remove(ref(db, `horses/${btn.getAttribute("data-id")}`));
              }
            };
          });
        });

        // 3. 【既存】投票データのみリセット
        const resetVotesBtn = document.getElementById("js-reset-votes");
        if (resetVotesBtn) {
          resetVotesBtn.onclick = () => {
            if (confirm("全ユーザーの【投票データのみ】を削除しますか？")) {
              remove(ref(db, "combos"));
              remove(ref(db, "logs"));
              alert("投票データをリセットしました");
            }
          };
        }

        // 4. 【追加】出走表（全キャラ）をリセット
        // HTML側に id="js-reset-horses" のボタンがあることを前提としています
        const resetHorsesBtn = document.getElementById("js-reset-horses");
        if (resetHorsesBtn) {
          resetHorsesBtn.onclick = () => {
            if (confirm("【警告】出走登録されている全てのキャラを削除しますか？")) {
              if (confirm("本当によろしいですか？この操作は取り消せません。")) {
                remove(ref(db, "horses"));
                alert("出走表を全削除しました");
              }
            }
          };
        }
      }
    </script>
  </body>
</html>
