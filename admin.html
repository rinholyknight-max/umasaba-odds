<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理者画面 - うまさば</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container is-loading">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">管理パネル</span>
        <button id="js-dark-mode-toggle" class="l-header__theme-toggle" aria-label="テーマ切り替え">
          <span class="material-symbols-outlined icon-sun">toggle_off</span>
          <span class="material-symbols-outlined icon-moon">toggle_on</span>
        </button>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <div class="l-menu__user-box">
        <div class="l-menu__user-icon">
          <span class="material-symbols-outlined">account_circle</span>
        </div>
        <div class="l-menu__user-info">
          <p class="l-menu__user-label">ログインユーザー</p>
          <span id="js-display-user" class="l-menu__user-name"></span>
        </div>
      </div>

      <ul class="l-menu__list">
        <li class="l-menu__item">
          <a href="index.html" class="l-menu__link"><span class="material-symbols-outlined">how_to_vote</span>投票画面</a>
        </li>
        <li class="l-menu__item">
          <a href="odds.html" class="l-menu__link"><span class="material-symbols-outlined">leaderboard</span>オッズ確認</a>
        </li>
        <li class="l-menu__item">
          <a href="settings.html" class="l-menu__link"><span class="material-symbols-outlined">settings</span>設定変更</a>
        </li>
        <li class="l-menu__item">
          <a href="admin.html" class="l-menu__link"><span class="material-symbols-outlined">admin_panel_settings</span>管理者画面</a>
        </li>
        <li class="l-menu__item">
          <button id="js-logout" class="l-menu__link"><span class="material-symbols-outlined">logout</span>ログアウト</button>
        </li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-admin">
      <h1 class="p-admin__title">出走登録</h1>

      <section class="p-admin__register">
        <div class="p-admin__register-group">
          <input type="text" id="horse-name" class="c-input" placeholder="登録キャラ名" list="master-chars" autocomplete="off" />
          <datalist id="master-chars"></datalist>
          <input type="text" id="user-name" class="c-input" placeholder="ユーザー名" autocomplete="off" />
          <button id="add-btn" class="c-button c-button--primary">登録</button>
        </div>
      </section>

      <div class="p-admin__upload" style="margin: 20px 0; padding: 15px; border: 1px dashed #ccc">
        <p style="font-size: 0.9rem; margin-bottom: 10px">CSVまたはテキストファイルで一括登録</p>
        <input type="file" id="js-upload-file" accept=".txt,.csv" />
        <p style="font-size: 0.8rem; color: #666">形式: キャラ名,ユーザー名 (1行に1人)</p>
      </div>

      <section class="p-admin__register" style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px">
        <h2 style="font-size: 1rem; margin-bottom: 10px">ユーザー許可登録（ゲームID）</h2>

        <div class="p-admin__register-group" style="display: flex; gap: 10px; flex-wrap: wrap">
          <input type="text" id="new-allow-id" class="c-input" placeholder="ウマ娘ゲームID" autocomplete="off" />
          <input type="text" id="new-allow-name" class="c-input" placeholder="表示名" autocomplete="off" />

          <select id="new-allow-circle" class="c-input" style="width: auto">
            <option value="LastCrop">LastCrop</option>
            <option value="cocoa">cocoa</option>
            <option value="Snowknight">Snowknight</option>
            <option value="Smile">Smile</option>
            <option value="その他">その他</option>
          </select>

          <button id="add-allow-btn" class="c-button c-button--primary">許可リストに追加</button>
        </div>
        <p id="add-allow-msg" style="margin-top: 10px; font-size: 0.8rem; min-height: 1.2em"></p>

        <div class="p-admin__upload" style="margin: 20px 0; padding: 15px; border: 1px dashed #626262; background: var(--color-bg-sub)">
          <p style="font-size: 0.9rem; margin-bottom: 10px; font-weight: bold">【名簿用】CSVで一括登録</p>
          <input type="file" id="js-allow-csv-file" accept=".csv" />
          <button id="js-allow-csv-btn" class="c-button--primary c-button" style="margin-top: 10px; font-size: 0.8rem">名簿一括アップロード</button>
          <p style="font-size: 0.75rem; color: #666; margin-top: 5px">形式: ゲームID, 表示名, サークル名 (1行に1人)</p>
        </div>
      </section>

      <div class="p-admin__danger-zone">
        <button id="js-reset-votes" class="c-button c-button--danger">投票データのみリセット</button>
        <button id="js-reset-horses" class="c-button c-button--danger" style="margin-top: 10px">出走表を全削除</button>
      </div>

      <div id="admin-list" class="p-admin__list"></div>
    </main>

    <script type="module">
      import { initAdmin } from "./js/admin.js";
      initAdmin();
    </script>
  </body>
</html>
