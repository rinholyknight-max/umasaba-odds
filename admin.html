<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理者画面 - ウマサバ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <main class="p-admin">
      <h1 class="p-admin__title">🛠 管理者パネル</h1>

      <section class="p-admin__register">
        <input type="text" id="horse-name" class="c-input" placeholder="馬の名前を入力" />
        <button id="add-btn" class="c-button c-button--primary">馬を登録する</button>
      </section>

      <hr class="c-divider" />

      <div id="admin-list" class="p-admin__list"></div>

      <div class="p-admin__footer">
        <button onclick="location.href = 'index.html'" class="c-button c-button--secondary">投票画面へ戻る</button>
      </div>
    </main>

    <script type="module">
      // ログインチェック：auth.jsを使う形に書き換えるとよりスマートです
      if (sessionStorage.getItem("auth_role") !== "admin") {
        alert("管理者権限が必要です。ログインし直してください。");
        window.location.href = "login.html";
      }

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "umasaba-odds.firebaseapp.com",
        databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
        projectId: "umasaba-odds",
        storageBucket: "umasaba-odds.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      // 馬の追加
      document.getElementById("add-btn").onclick = () => {
        const name = document.getElementById("horse-name").value;
        if (name) {
          const newHorseRef = push(ref(db, "horses"));
          set(newHorseRef, { name: name, votes: 0 });
          document.getElementById("horse-name").value = "";
        }
      };

      // リスト表示（BEMクラスを付与するように修正）
      onValue(ref(db, "horses"), (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById("admin-list");
        list.innerHTML = "";
        for (let id in data) {
          const item = document.createElement("div");
          item.className = "p-admin__item"; // BEMクラス
          item.innerHTML = `
                    <span class="p-admin__item-name">${data[id].name}</span>
                    <button 
                        onclick="deleteHorse('${id}')" 
                        class="c-button c-button--danger"
                    >削除</button>
                `;
          list.appendChild(item);
        }
      });

      window.deleteHorse = (id) => {
        if (confirm("本当に削除しますか？")) {
          remove(ref(db, `horses/${id}`));
        }
      };
    </script>
  </body>
</html>
