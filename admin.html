<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>管理画面 - 出走馬管理</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        max-width: 600px;
        margin: auto;
      }
      .admin-box {
        background: #f9f9f9;
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      input {
        padding: 8px;
        width: 200px;
      }
      .horse-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #eee;
        background: white;
      }
      .del-btn {
        background: #ff4d4d;
        color: white;
        border: none;
        padding: 5px 10px;
        cursor: pointer;
        border-radius: 3px;
      }
      .del-btn:hover {
        background: #cc0000;
      }
      h2 {
        border-left: 5px solid #007bff;
        padding-left: 10px;
        margin-top: 30px;
      }
    </style>
  </head>
  <body>
    <h1>レース管理パネル</h1>

    <div class="admin-box">
      <h3>新規登録</h3>
      <input type="text" id="horseName" placeholder="馬名/艇名を入力" />
      <button id="addBtn" style="padding: 8px 15px; cursor: pointer">登録</button>
    </div>

    <h2>現在の出走馬一覧</h2>
    <div id="horseList">読み込み中...</div>

    <hr style="margin-top: 50px" />
    <button onclick="location.href = 'index.html'">ユーザー画面を確認する</button>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // あなたのConfigをここに貼り付け
      const firebaseConfig = {
        apiKey: "AIzaSyBp5Cg6A3v3VZal-orAiwFjphKIDYx9ATo",
        authDomain: "umasaba-odds.firebaseapp.com",
        projectId: "umasaba-odds",
        storageBucket: "umasaba-odds.firebasestorage.app",
        messagingSenderId: "802834774249",
        appId: "1:802834774249:web:5623185854ead82c261878",
      };

      // ログインチェック
      if (sessionStorage.getItem("auth_role") !== "admin") {
        alert("管理者としてログインしてください");
        window.location.href = "login.html";
      }

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const raceRef = doc(db, "races", "current_race");

      // --- 1. リアルタイム一覧表示 ---
      onSnapshot(raceRef, (snapshot) => {
        const listDiv = document.getElementById("horseList");
        if (!snapshot.exists() || snapshot.data().horses.length === 0) {
          listDiv.innerHTML = "<p>登録されている馬はいません。</p>";
          return;
        }

        const horses = snapshot.data().horses;
        listDiv.innerHTML = horses
          .map(
            (h, i) => `
                <div class="horse-item">
                    <span><b>${i + 1}.</b> ${h.name} (${h.bets}pt)</span>
                    <button class="del-btn" onclick="deleteHorse(${i})">削除</button>
                </div>
            `,
          )
          .join("");
      });

      // --- 2. 登録処理 ---
      document.getElementById("addBtn").onclick = async () => {
        const nameInput = document.getElementById("horseName");
        if (!nameInput.value) return;

        onSnapshot(
          raceRef,
          async (docSnap) => {
            let horses = docSnap.exists() ? docSnap.data().horses : [];
            horses.push({ name: nameInput.value, bets: 0 });
            await setDoc(raceRef, { horses: horses });
            nameInput.value = "";
          },
          { once: true },
        );
      };

      // --- 3. 削除処理 (グローバル関数として登録) ---
      window.deleteHorse = async (index) => {
        if (!confirm("本当に削除しますか？")) return;

        onSnapshot(
          raceRef,
          async (docSnap) => {
            let horses = docSnap.data().horses;
            horses.splice(index, 1); // 指定した番号の要素を1つ消す
            await setDoc(raceRef, { horses: horses });
          },
          { once: true },
        );
      };
    </script>
  </body>
</html>
