<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理者画面 - うまさば</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">管理パネル</span>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <ul class="l-menu__list">
        <li class="l-menu__item"><a href="index.html" class="l-menu__link">投票画面</a></li>
        <li class="l-menu__item"><a href="odds.html" class="l-menu__link">オッズ確認</a></li>
        <li class="l-menu__item"><a href="admin.html" class="l-menu__link">管理者画面</a></li>
        <li class="l-menu__item"><button id="js-logout" class="l-menu__link">ログアウト</button></li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-admin">
      <h1 class="p-admin__title">出走登録</h1>

      <section class="p-admin__register">
        <div class="p-admin__register-group">
          <input type="text" id="horse-name" class="c-input" placeholder="登録キャラ名" list="master-chars" autocomplete="off" />
          <datalist id="master-chars"></datalist>
          <input type="text" id="user-name" class="c-input" placeholder="ユーザー名" autocomplete="off" />
          <button id="add-btn" class="c-button c-button--primary">登録する</button>
        </div>
      </section>

      <div style="margin: 20px 0; text-align: right">
        <button id="js-reset-votes" class="c-button c-button--danger" style="font-size: 0.7rem">投票データのみリセット</button>
      </div>

      <div id="admin-list" class="p-admin__list"></div>
    </main>

    <script type="module">
      import { checkAuth, logout } from "./js/auth.js";
      import { initMenu } from "./js/menu.js";

      // SDKバージョンを 12.11.0 に統一
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

      // "admin"権限チェック（auth.js側が対応している前提）
      if (checkAuth("admin")) {
        initMenu();
        document.getElementById("js-logout").onclick = logout;

        // 最新の正しい構成値に差し替え
        // あなたのConfigをここに貼り付け
        const firebaseConfig = {
          apiKey: "AIzaSyBp5Cg6A3v3VZal-orAiwFjphKIDYx9ATo",
          authDomain: "umasaba-odds.firebaseapp.com",
          projectId: "umasaba-odds",
          storageBucket: "umasaba-odds.firebasestorage.app",
          messagingSenderId: "802834774249",
          appId: "1:802834774249:web:5623185854ead82c261878",
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const charInput = document.getElementById("horse-name");
        const userInput = document.getElementById("user-name");
        const dataList = document.getElementById("master-chars");
        const addBtn = document.getElementById("add-btn");

        // 1. マスターデータの読み込み
        fetch("./data/master.json")
          .then((res) => res.json())
          .then((data) => {
            data.forEach((name) => {
              const opt = document.createElement("option");
              opt.value = name;
              dataList.appendChild(opt);
            });
          })
          .catch(() => console.log("JSON load skipped: 自由入力のみで動作します"));

        // 2. 登録処理
        addBtn.onclick = () => {
          const hName = charInput.value.trim();
          const uName = userInput.value.trim();

          if (hName && uName) {
            // horsesノードに新しいIDでセット
            const horsesRef = ref(db, "horses");
            const newRef = push(horsesRef);

            set(newRef, {
              horseName: hName,
              userName: uName,
              votes: 0,
            })
              .then(() => {
                charInput.value = "";
                userInput.value = "";
                charInput.focus(); // 次の入力のためにフォーカスを戻す
              })
              .catch((err) => {
                console.error("保存エラー:", err);
                alert("保存に失敗しました: " + err.message);
              });
          } else {
            alert("キャラ名とユーザー名の両方を入力してください");
          }
        };

        // 3. 登録済みリストのリアルタイム表示と削除ボタン
        onValue(ref(db, "horses"), (snapshot) => {
          const data = snapshot.val();
          const list = document.getElementById("admin-list");
          list.innerHTML = "";

          if (!data) return;

          for (let id in data) {
            const item = document.createElement("div");
            item.className = "p-admin__item";
            item.innerHTML = `
          <div class="p-admin__info">
            <span class="p-admin__item-name" style="display:block; font-weight:bold;">${data[id].horseName}</span>
            <small style="color:#666;">ユーザー: ${data[id].userName}</small>
          </div>
          <button class="c-button c-button--danger js-delete-btn" data-id="${id}">削除</button>
        `;
            list.appendChild(item);
          }

          // 削除ボタンへのイベント割り当て（windowを使わない安全な方法）
          document.querySelectorAll(".js-delete-btn").forEach((btn) => {
            btn.onclick = () => {
              const targetId = btn.getAttribute("data-id");
              if (confirm("このキャラを削除しますか？")) {
                remove(ref(db, `horses/${targetId}`)).catch((err) => alert("削除に失敗しました: " + err.message));
              }
            };
          });
        });

        // 4. 投票データのリセット（combosノードを消す）
        // ※HTML側に id="js-reset-votes" のボタンがあることを前提としています
        const resetBtn = document.getElementById("js-reset-votes");
        if (resetBtn) {
          resetBtn.onclick = () => {
            if (confirm("全ユーザーの【投票データのみ】を削除しますか？（出走表は残ります）")) {
              remove(ref(db, "combos"));
              remove(ref(db, "logs"));
              alert("リセット完了");
            }
          };
        }
      }
    </script>
  </body>
</html>
