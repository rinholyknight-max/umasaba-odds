<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>合同杯4th ドラフトページ</title>
    <meta name="description" content="合同杯4th ドラフトページ" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <!-- css -->
    <link rel="stylesheet" href="/draft/css/style.css" />
    <link rel="stylesheet" href="/draft/css/admin.css" />
  </head>

  <body>
    <div id="login-container" class="hidden">
      <div class="login-box">
        <h2>管理画面ログイン</h2>
        <form id="login-form">
          <div class="input-group">
            <input type="text" id="username-input" placeholder="ユーザー名" required autocomplete="username" />
          </div>
          <div class="input-group">
            <input type="password" id="password-input" placeholder="パスワード" required autocomplete="current-password" />
          </div>
          <button type="submit">ログイン</button>
        </form>
        <p id="error-message" class="error-text"></p>
      </div>
    </div>

    <main id="admin-content" class="hidden">
      <header class="admin-header">
        <h1>管理画面ダッシュボード</h1>
        <button id="logout-btn">ログアウト</button>
      </header>

      <section class="admin-body">
        <p>ここは認証された6人のユーザーのみが閲覧できる保護されたスペースです。</p>
      </section>
    </main>

    <script type="module" src="../js/admin.js"></script>
  </body>
</html>
