<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>合同杯4th ドラフトページ</title>
    <meta name="description" content="合同杯4th ドラフトページ" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <!-- css -->
    <link rel="stylesheet" href="/draft/css/style.css" />
    <link rel="stylesheet" href="/draft/css/admin.css" />
  </head>

  <body>
    <div id="login-container" class="hidden">
      <div class="login-box">
        <h2>管理画面ログイン</h2>
        <form id="login-form">
          <div class="input-group">
            <input type="text" id="username-input" placeholder="ユーザー名" required autocomplete="username" />
          </div>
          <div class="input-group">
            <input type="password" id="password-input" placeholder="パスワード" required autocomplete="current-password" />
          </div>
          <button type="submit">ログイン</button>
        </form>
        <p id="error-message" class="error-text"></p>
      </div>
    </div>

    <main>
      <div id="admin-content" class="hidden">
        <div class="admin-header">
          <h2>チーム別 管理ダッシュボード</h2>
          <button id="logout-btn">ログアウト</button>
        </div>

        <div class="editor-layout">
          <div class="field-group">
            <label for="admin-text-input">テキスト入力はこちら</label>
            <textarea id="admin-text-input" placeholder="ここにテキストを入力してください（自動で改行や縦伸びに対応します）"></textarea>
          </div>

          <div class="field-group">
            <label>手書きはこちら</label>
            <div class="canvas-wrapper">
              <canvas id="drawing-canvas" width="400" height="300"></canvas>
              <div class="color-palette">
                <button type="button" class="color-btn active" data-color="#000000" style="background-color: #000000"></button>
                <button type="button" class="color-btn" data-color="#ed3838" style="background-color: #ed3838"></button>
                <button type="button" class="color-btn" data-color="#3893ed" style="background-color: #3893ed"></button>
                <button type="button" class="color-btn" data-color="#34c759" style="background-color: #34c759"></button>
                <!-- 自由な色を選ばせたい場合はインプットも併用可能です -->
                <input type="color" id="color-picker" value="#000000" />
              </div>
              <button id="clear-btn" type="button">描き直す（全消去）</button>
            </div>
          </div>
        </div>

        <button id="save-submit-btn">この内容で保存する</button>
      </div>
    </main>

    <script type="module" src="/draft/js/admin.js"></script>
  </body>
</html>
