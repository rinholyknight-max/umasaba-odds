<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オッズ投票 - ウマサバ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">🏇 ウマサバ投票</span>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <ul class="l-menu__list">
        <li class="l-menu__item"><a href="index.html" class="l-menu__link">投票画面</a></li>
        <li class="l-menu__item"><a href="admin.html" class="l-menu__link">管理者画面</a></li>
        <li class="l-menu__item"><button id="js-logout" class="l-menu__link">ログアウト</button></li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-voting">
      <h1 class="p-voting__title">レース出走表</h1>
      <div id="horse-list" class="p-voting__list">読み込み中...</div>
    </main>

    <script type="module">
      // 【修正禁止】ログインチェック
      import { checkAuth, logout } from "./js/auth.js";
      import { initMenu } from "./js/menu.js";

      // 【修正禁止】ライブラリ
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      if (checkAuth()) {
        initMenu();
        document.getElementById("js-logout").onclick = logout;

        // 【重要】admin.htmlと同じConfigを必ず使用してください
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "umasaba-odds.firebaseapp.com",
          databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
          projectId: "umasaba-odds",
          storageBucket: "umasaba-odds.appspot.com",
          messagingSenderId: "YOUR_ID",
          appId: "YOUR_APP_ID",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const horseListDiv = document.getElementById("horse-list");

        onValue(ref(db, "horses"), (snapshot) => {
          const data = snapshot.val();
          horseListDiv.innerHTML = "";

          if (!data) {
            horseListDiv.innerHTML = "<p class='p-voting__loading'>現在、登録されている馬はいません。</p>";
            return;
          }

          for (let id in data) {
            const h = data[id];
            const item = document.createElement("div");
            item.className = "p-voting__item";
            item.innerHTML = `
                        <div class="p-voting__info">
                            <span class="p-voting__name">${h.name}</span>
                            <span class="p-voting__votes">${h.votes || 0} 票</span>
                        </div>
                        <button class="c-button c-button--primary p-voting__button">投票する</button>
                    `;

            item.querySelector("button").onclick = () => {
              update(ref(db, `horses/${id}`), { votes: increment(1) });
              alert(`${h.name}に投票しました！`);
            };
            horseListDiv.appendChild(item);
          }
        });
      }
    </script>
  </body>
</html>
