<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3連複投票 - うまさば</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">うまさば投票</span>
        <button id="js-page-info" class="l-header__info-btn" aria-label="ページ説明">
          <span class="material-symbols-outlined">info</span>
        </button>
        <button id="js-dark-mode-toggle" class="l-header__theme-toggle" aria-label="テーマ切り替え">
          <span class="material-symbols-outlined icon-sun">toggle_off</span>
          <span class="material-symbols-outlined icon-moon">toggle_on</span>
        </button>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <div class="l-menu__user-box">
        <a href="user.html" class="l-menu__user-link">
          <div class="l-menu__user-icon">
            <span class="material-symbols-outlined">account_circle</span>
          </div>
          <p>My Page</p>
          <span id="js-display-user" class="l-menu__user-name">読み込み中</span>
        </a>
      </div>

      <ul class="l-menu__list">
        <li class="l-menu__item">
          <a href="index.html" class="l-menu__link"><span class="material-symbols-outlined">how_to_vote</span>投票画面</a>
        </li>
        <li class="l-menu__item">
          <a href="odds.html" class="l-menu__link"><span class="material-symbols-outlined">leaderboard</span>オッズ確認</a>
        </li>
        <li class="l-menu__item">
          <a href="settings.html" class="l-menu__link"><span class="material-symbols-outlined">settings</span>設定変更</a>
        </li>
        <li class="l-menu__item">
          <a href="admin.html" class="l-menu__link"><span class="material-symbols-outlined">admin_panel_settings</span>管理者画面</a>
        </li>
        <li class="l-menu__item">
          <button id="js-logout" class="l-menu__link"><span class="material-symbols-outlined">logout</span>ログアウト</button>
        </li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="l-main-content">
      <div class="p-voting__selection-container js-sticky-header">
        <div id="js-race-dots" class="p-voting__dots"></div>
        <h1 id="js-active-race-title" class="p-voting__title">読み込み中...</h1>

        <div class="p-voting__slots">
          <div class="p-voting__slot" data-slot="1">1枠: <span class="slot-name">未選択</span></div>
          <div class="p-voting__slot" data-slot="2">2枠: <span class="slot-name">未選択</span></div>
          <div class="p-voting__slot" data-slot="3">3枠: <span class="slot-name">未選択</span></div>
        </div>
      </div>

      <div class="p-voting">
        <div id="js-race-slider" class="p-voting__slider"></div>

        <div class="p-voting__form-footer">
          <div class="p-voting__input-group">
            <label for="js-voter-name" class="p-voting__label">投票者名</label>
            <input type="text" id="js-voter-name" class="c-input" placeholder="あなたの名前を入力" maxlength="15" />
          </div>

          <div class="p-voting__input-group">
            <label for="js-voter-comment" class="p-voting__label">応援コメント（任意）</label>
            <textarea id="js-voter-comment" class="c-input" placeholder="推しへのメッセージをどうぞ！" rows="2"></textarea>
          </div>

          <div class="p-voting__actions">
            <button id="js-clear-btn" class="c-button c-button--secondary">クリア</button>
            <button id="js-submit-vote" class="c-button c-button--primary" disabled>投票を確定する</button>
          </div>
        </div>
      </div>
    </main>

    <div id="js-modal" class="c-modal">
      <div id="js-modal-overlay" class="c-modal__overlay"></div>
      <div class="c-modal__content">
        <div class="c-modal__header">
          <h2 id="js-modal-title" class="c-modal__title"></h2>
          <button id="js-modal-close" class="c-modal__close">×</button>
        </div>
        <div id="js-modal-comment-list" class="c-modal__body"></div>
      </div>
    </div>

    <script type="module">
      import { initVoting } from "./js/voting.js";
      initVoting();
    </script>
  </body>
</html>
