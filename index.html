<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ウマサバ・オッズ投票</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <main class="p-voting">
      <h1 class="p-voting__title">🏇 ウマサバ・オッズ投票</h1>

      <div id="horse-list" class="p-voting__list">
        <p class="p-voting__loading">読み込み中...</p>
      </div>
    </main>

    <script type="module">
      // ログインチェック
      if (!sessionStorage.getItem("auth_role")) {
        alert("ログインしてください");
        window.location.href = "login.html";
      }

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "umasaba-odds.firebaseapp.com",
        databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
        projectId: "umasaba-odds",
        storageBucket: "umasaba-odds.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const horseListDiv = document.getElementById("horse-list");

      // 表示の更新
      onValue(ref(db, "horses"), (snapshot) => {
        const data = snapshot.val();
        horseListDiv.innerHTML = "";

        for (let id in data) {
          const h = data[id];

          // BEM: 各馬の行(Item)を作成
          const item = document.createElement("div");
          item.className = "p-voting__item";

          item.innerHTML = `
                    <div class="p-voting__info">
                        <span class="p-voting__name">${h.name}</span>
                        <span class="p-voting__votes">${h.votes || 0} 票</span>
                    </div>
                    <button class="c-button c-button--primary p-voting__button">
                        投票する
                    </button>
                `;

          // 投票ボタンの処理
          const btn = item.querySelector(".p-voting__button");
          btn.onclick = () => {
            update(ref(db, `horses/${id}`), { votes: increment(1) });
            alert(`${h.name}に投票しました！`);
          };

          horseListDiv.appendChild(item);
        }
      });
    </script>
  </body>
</html>
