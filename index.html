<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3連複投票 - うまさば</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">うまさば投票</span>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <ul class="l-menu__list">
        <li class="l-menu__item"><a href="index.html" class="l-menu__link">投票画面</a></li>
        <li class="l-menu__item"><a href="odds.html" class="l-menu__link">オッズ確認</a></li>
        <li class="l-menu__item"><a href="admin.html" class="l-menu__link">管理者画面</a></li>
        <li class="l-menu__item"><button id="js-logout" class="l-menu__link">ログアウト</button></li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-voting">
      <h1 class="p-voting__title">3連複 投票フォーム</h1>

      <div id="selection-area" class="p-voting__selection">
        <div class="p-voting__slot" data-slot="1">1枠: <span class="slot-name">未選択</span></div>
        <div class="p-voting__slot" data-slot="2">2枠: <span class="slot-name">未選択</span></div>
        <div class="p-voting__slot" data-slot="3">3枠: <span class="slot-name">未選択</span></div>
        <div class="p-voting__actions">
          <button id="js-clear-btn" class="c-button c-button--danger">クリア</button>
          <button id="js-submit-vote" class="c-button c-button--primary" disabled>投票を確定する</button>
        </div>
      </div>

      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee" />

      <h2 class="p-voting__subtitle" style="text-align: center; font-size: 1rem; margin-bottom: 15px">出走表（3頭選んでください）</h2>
      <div id="horse-list" class="p-voting__list">読み込み中...</div>
    </main>

    <script type="module">
      import { checkAuth, logout } from "./js/auth.js";
      import { initMenu } from "./js/menu.js";
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue, update, increment, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      if (checkAuth()) {
        initMenu();
        document.getElementById("js-logout").onclick = logout;

        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "umasaba-odds.firebaseapp.com",
          databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
          projectId: "umasaba-odds",
          storageBucket: "umasaba-odds.appspot.com",
          messagingSenderId: "YOUR_ID",
          appId: "YOUR_APP_ID",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let selectedHorses = [];
        const horseListDiv = document.getElementById("horse-list");
        const submitBtn = document.getElementById("js-submit-vote");

        const updateSelectionUI = () => {
          for (let i = 1; i <= 3; i++) {
            const slot = document.querySelector(`.p-voting__slot[data-slot="${i}"] .slot-name`);
            slot.innerText = selectedHorses[i - 1] ? selectedHorses[i - 1].name : "未選択";
          }
          submitBtn.disabled = selectedHorses.length < 3;
        };

        document.getElementById("js-clear-btn").onclick = () => {
          selectedHorses = [];
          updateSelectionUI();
        };

        // 投票実行（3連複：順不同対応）
        submitBtn.onclick = async () => {
          if (selectedHorses.length < 3) return;

          // 重要：名前を取り出してソートする（これでA-B-CとC-B-Aを同じ扱いにする）
          const sortedNames = selectedHorses.map((h) => h.name).sort();
          const ticketId = sortedNames.join("_");

          try {
            // combos 階層に保存（IDが名前順なので重複しない）
            await update(ref(db, `combos/${ticketId}`), {
              votes: increment(1),
              names: sortedNames,
            });

            await push(ref(db, "logs"), {
              combination: ticketId,
              timestamp: serverTimestamp(),
            });

            alert(`投票完了！\n組み合わせ: ${sortedNames.join(" / ")}`);
            selectedHorses = [];
            updateSelectionUI();
          } catch (e) {
            console.error(e);
            alert("エラーが発生しました。");
          }
        };

        onValue(ref(db, "horses"), (snapshot) => {
          const data = snapshot.val();
          horseListDiv.innerHTML = "";
          if (!data) return;

          for (let id in data) {
            const h = data[id];
            const item = document.createElement("div");
            item.className = "p-voting__item";

            // 選択済みの場合はスタイルを変えるなどの工夫も可能
            item.innerHTML = `
                <div class="p-voting__info">
                    <div class="p-voting__text-group">
                        <span class="p-voting__name">${h.horseName}</span>
                        <span class="p-voting__user">トレーナー: ${h.userName}</span>
                    </div>
                </div>
                <button class="c-button c-button--secondary">選択</button>
            `;

            item.querySelector("button").onclick = (e) => {
              const btn = e.target;
              const horseIdx = selectedHorses.findIndex((s) => s.id === id);

              if (horseIdx > -1) {
                // すでに選択済みなら解除
                selectedHorses.splice(horseIdx, 1);
              } else {
                // 未選択なら追加（3頭まで）
                if (selectedHorses.length >= 3) {
                  alert("3頭まで選択可能です。");
                  return;
                }
                selectedHorses.push({ id, name: h.horseName });
              }
              updateSelectionUI();
            };
            horseListDiv.appendChild(item);
          }
        });
      }
    </script>
  </body>
</html>
