<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ウマサバ・オッズ投票</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <h1>🏇 ウマサバ・オッズ投票</h1>
    <div id="horse-list">読み込み中...</div>

    <script type="module">
      // --- ログインチェック：promptを削除 ---
      if (!sessionStorage.getItem("auth_role")) {
        alert("ログインしてください");
        window.location.href = "login.html";
      }

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      // Firebaseの設定（あなたの設定をここに貼り付け）
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "umasaba-odds.firebaseapp.com",
        databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
        projectId: "umasaba-odds",
        storageBucket: "umasaba-odds.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const horseListDiv = document.getElementById("horse-list");

      // 馬リストの表示と投票処理
      onValue(ref(db, "horses"), (snapshot) => {
        const data = snapshot.val();
        horseListDiv.innerHTML = "";
        for (let id in data) {
          const h = data[id];
          const btn = document.createElement("button");
          btn.textContent = `${h.name} (${h.votes || 0}票)`;
          btn.onclick = () => {
            update(ref(db, `horses/${id}`), { votes: increment(1) });
            alert(`${h.name}に投票しました！`);
          };
          horseListDiv.appendChild(btn);
        }
      });
    </script>
  </body>
</html>
