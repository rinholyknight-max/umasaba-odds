<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン - ウマサバ</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <main class="p-login">
      <h1 class="p-login__title">ログイン</h1>

      <div class="p-login__form">
        <input type="password" id="pass" class="c-input" placeholder="パスワードを入力" />
        <button id="login-btn" class="c-button c-button--primary">ログイン</button>
      </div>
    </main>

    <script type="module">
      import { login } from "./js/auth.js";

      document.getElementById("login-btn").onclick = () => {
        const pass = document.getElementById("pass").value;
        login(pass);
      };
    </script>
  </body>
</html>
