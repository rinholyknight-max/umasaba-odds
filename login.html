<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ログイン - うまさば</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <main class="p-login">
      <h1 class="p-login__title">ログイン</h1>
      <div class="p-login__form">
        <input type="text" id="login-input" class="c-input" placeholder="ゲームID または 共有パスワード" />
        <button id="login-btn" class="c-button c-button--primary">ログイン</button>
      </div>
      <p style="font-size: 0.7rem; color: var(--text-sub); margin-top: 15px; text-align: center">※初めてのIDでログインすると、自動的に個人登録されます。</p>
    </main>

    <script type="module">
      import { initTheme } from "./js/theme.js";
      import { login } from "./js/auth.js";
      initTheme();

      document.getElementById("login-btn").onclick = () => {
        login(document.getElementById("pass").value);
      };
    </script>
  </body>
</html>
