<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ログイン - ウマサバ・オッズ</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #eee;
      }
      .login-box {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
      }
      input {
        display: block;
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>ログイン</h2>
      <input type="password" id="pass" placeholder="パスワードを入力" />
      <button onclick="auth()">入室</button>
      <p id="msg" style="color: red"></p>
    </div>

    <script>
      function auth() {
        const pass = document.getElementById("pass").value;
        const msg = document.getElementById("msg");

        if (pass === "admin99") {
          // 管理者としてログイン
          sessionStorage.setItem("auth_role", "admin");
          window.location.href = "admin.html";
        } else if (pass === "1234") {
          // 一般ユーザーとしてログイン
          sessionStorage.setItem("auth_role", "user");
          window.location.href = "index.html";
        } else {
          msg.innerText = "パスワードが正しくありません";
        }
      }
    </script>
  </body>
</html>
