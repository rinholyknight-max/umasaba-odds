<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>ログイン - ウマサバ</title>
    <style>
      body {
        font-family: sans-serif;
        text-align: center;
        padding-top: 50px;
      }
      input {
        padding: 10px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h1>🔑 ログイン</h1>
    <input type="password" id="pass" placeholder="パスワードを入力" />
    <button id="login-btn">ログイン</button>

    <script>
      document.getElementById("login-btn").onclick = () => {
        const pass = document.getElementById("pass").value;

        // 【修正OK】パスワードの文字列を変えたい場合はここを編集
        if (pass === "1234") {
          sessionStorage.setItem("auth_role", "user");
          window.location.href = "index.html";
        } else if (pass === "admin99") {
          sessionStorage.setItem("auth_role", "admin");
          window.location.href = "admin.html";
        } else {
          alert("パスワードが違います");
        }
      };
    </script>
  </body>
</html>
