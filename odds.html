<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オッズ確認画面 - うまさば</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">オッズ投票結果</span>
        <button id="js-dark-mode-toggle" class="l-header__theme-toggle" aria-label="テーマ切り替え">
          <span class="material-symbols-outlined icon-sun">toggle_off</span>
          <span class="material-symbols-outlined icon-moon">toggle_on</span>
        </button>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <div class="l-menu__user-box">
        <div class="l-menu__user-icon">
          <span class="material-symbols-outlined">account_circle</span>
        </div>
        <div class="l-menu__user-info">
          <p class="l-menu__user-label">ログインユーザー</p>
          <span id="js-display-user" class="l-menu__user-name"></span>
        </div>
      </div>

      <ul class="l-menu__list">
        <li class="l-menu__item">
          <a href="index.html" class="l-menu__link"><span class="material-symbols-outlined">how_to_vote</span>投票画面</a>
        </li>
        <li class="l-menu__item">
          <a href="odds.html" class="l-menu__link"><span class="material-symbols-outlined">leaderboard</span>オッズ確認</a>
        </li>
        <li class="l-menu__item">
          <a href="settings.html" class="l-menu__link"><span class="material-symbols-outlined">settings</span>設定変更</a>
        </li>
        <li class="l-menu__item">
          <a href="admin.html" class="l-menu__link"><span class="material-symbols-outlined">admin_panel_settings</span>管理者画面</a>
        </li>
        <li class="l-menu__item">
          <button id="js-logout" class="l-menu__link"><span class="material-symbols-outlined">logout</span>ログアウト</button>
        </li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>
    <main class="l-main-content odds-content">
      <div id="js-race-selector" class="p-odds-selector" style="display: none">
        <h1 class="p-voting__title">公開中のオッズ</h1>
        <div id="js-race-list" class="p-voting__list"></div>
      </div>

      <div id="js-odds-detail" class="p-voting is-results" style="display: none">
        <div class="p-voting__fixed-header">
          <h1 id="js-race-title" class="p-voting__title">投票結果</h1>

          <div class="p-voting__quick-selector" style="margin-bottom: 15px">
            <select id="js-race-quick-select" class="c-input" style="font-size: 0.85rem; padding: 8px">
              <option value="">他のレースに切り替え...</option>
            </select>
          </div>

          <div class="p-voting__chart-container">
            <canvas id="oddsChart"></canvas>
          </div>

          <details class="p-voting__filter-details">
            <summary class="p-voting__filter-summary">
              <span class="material-symbols-outlined">filter_list</span>
              絞り込み・並び替え
            </summary>
            <div class="p-voting__filter-content">
              <div class="p-voting__search-box">
                <input type="text" id="js-search-input" class="c-input" placeholder="キャラ名で絞り込み..." />
              </div>
              <div class="p-voting__controls">
                <button id="sort-asc" class="c-button c-button--secondary">人気順 ↓</button>
                <button id="sort-desc" class="c-button c-button--secondary">大穴順 ↑</button>
              </div>
            </div>
          </details>

          <div style="margin-top: 15px">
            <a href="odds.html" class="c-button c-button--secondary" style="width: 100%; font-size: 0.8rem">
              <span class="material-symbols-outlined" style="font-size: 1.2rem">arrow_back</span>
              レース一覧へ戻る
            </a>
          </div>
        </div>

        <div class="p-voting__main-content">
          <div id="total-info" class="p-voting__total"></div>
          <div id="odds-list" class="p-voting__list"></div>
        </div>
      </div>
    </main>

    <!-- コメントモーダル -->
    <div id="js-modal" class="c-modal">
      <div class="c-modal__overlay" id="js-modal-overlay"></div>
      <div class="c-modal__content">
        <div class="c-modal__header">
          <h3 id="js-modal-title" class="c-modal__title">投票者コメント一覧</h3>
          <button id="js-modal-close" class="c-modal__close-btn">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="c-modal__body">
          <div id="js-modal-comment-list" class="c-modal__comment-list"></div>
        </div>
      </div>
    </div>
    <!-- コメントモーダル -->

    <script type="module">
      import { initOdds } from "./js/odds.js";
      initOdds();
    </script>
  </body>
</html>
