<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>オッズ確認画面 - うまさば</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">オッズ投票結果</span>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <ul class="l-menu__list">
        <li class="l-menu__item"><a href="index.html" class="l-menu__link">投票画面</a></li>
        <li class="l-menu__item"><a href="odds.html" class="l-menu__link">オッズ確認</a></li>
        <li class="l-menu__item"><a href="admin.html" class="l-menu__link">管理者画面</a></li>
        <li class="l-menu__item"><button id="js-logout" class="l-menu__link">ログアウト</button></li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-voting">
      <h1 class="p-voting__title">投票結果</h1>

      <div class="p-voting__chart-container">
        <canvas id="oddsChart"></canvas>
      </div>

      <div style="margin-bottom: 15px">
        <input type="text" id="js-search-input" class="c-input" placeholder="キャラ名で絞り込み..." />
      </div>

      <div class="p-voting__controls">
        <button id="sort-asc" class="c-button c-button--secondary">人気順 ↓</button>
        <button id="sort-desc" class="c-button c-button--secondary">大穴順 ↑</button>
      </div>

      <div id="odds-list" class="p-voting__list">データ集計中...</div>
      <div id="total-info" class="p-voting__total"></div>
    </main>

    <script type="module">
      import { checkAuth, logout } from "./js/auth.js";
      import { initMenu } from "./js/menu.js";
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
      import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

      const isAuthorized = checkAuth();

      if (isAuthorized) {
        initMenu();
        const logoutBtn = document.getElementById("js-logout");
        if (logoutBtn) logoutBtn.onclick = logout;

        const firebaseConfig = {
          apiKey: "AIzaSyBp5Cg6A3v3VZal-orAiwFjphKIDYx9ATo",
          authDomain: "umasaba-odds.firebaseapp.com",
          databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
          projectId: "umasaba-odds",
          storageBucket: "umasaba-odds.firebasestorage.app",
          messagingSenderId: "802834774249",
          appId: "1:802834774249:web:5623185854ead82c261878",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const oddsListDiv = document.getElementById("odds-list");
        const totalInfoDiv = document.getElementById("total-info");
        const searchInput = document.getElementById("js-search-input");
        const sortAscBtn = document.getElementById("sort-asc");
        const sortDescBtn = document.getElementById("sort-desc");

        // --- 状態管理 ---
        let allCombos = [];
        let totalVotes = 0;
        let horseToUserMap = {};
        let currentSortOrder = "asc";
        let myChart = null;

        // --- グラフ更新関数 ---
        const updateChart = () => {
          const canvas = document.getElementById("oddsChart");
          if (!canvas) return;
          const ctx = canvas.getContext("2d");

          const horseVotes = {};
          allCombos.forEach((c) => {
            const names = c.id.split("_");
            names.forEach((name) => {
              horseVotes[name] = (horseVotes[name] || 0) + c.v;
            });
          });

          const sortedHorses = Object.entries(horseVotes)
            .map(([name, votes]) => ({ name, votes }))
            .sort((a, b) => b.votes - a.votes);

          const limit = 7;
          let displayData = sortedHorses.slice(0, limit);
          const otherVotes = sortedHorses.slice(limit).reduce((sum, h) => sum + h.votes, 0);
          if (otherVotes > 0) displayData.push({ name: "その他", votes: otherVotes });

          if (myChart) myChart.destroy();
          // グローバルな Chart オブジェクトを使用
          myChart = new Chart(ctx, {
            type: "pie",
            data: {
              labels: displayData.map((h) => h.name),
              datasets: [
                {
                  data: displayData.map((h) => h.votes),
                  backgroundColor: ["#FF6384", "#36A2EB", "#FFCE56", "#4BC0C0", "#9966FF", "#FF9F40", "#C9CBCF", "#7BC225"],
                  borderWidth: 2,
                  borderColor: "#ffffff",
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { position: "bottom", labels: { boxWidth: 12 } },
                title: { display: true, text: "ウマ娘別・支持率シェア" },
              },
            },
          });
        };

        // --- フィルタリング・ソート ---
        const getFilteredAndSortedData = (sortOrder) => {
          const keyword = (searchInput.value || "").toLowerCase();
          let filtered = allCombos.filter((c) => c.id.toLowerCase().includes(keyword));
          return sortOrder === "asc" ? filtered.sort((a, b) => b.v - a.v) : filtered.sort((a, b) => a.v - b.v);
        };

        // --- 描画関数 ---
        const render = (arr) => {
          if (!oddsListDiv) return;
          oddsListDiv.innerHTML = "";

          if (!arr || arr.length === 0) {
            oddsListDiv.innerHTML = "<p class='p-voting__loading'>該当する組み合わせはありません。</p>";
            return;
          }

          arr.forEach((c) => {
            const odds = c.v > 0 ? Math.floor((totalVotes / c.v) * 10) / 10 : 99.9;
            const names = c.id.split("_");
            const user0 = horseToUserMap[names[0]] || "不明";
            const user1 = horseToUserMap[names[1]] || "不明";
            const user2 = horseToUserMap[names[2]] || "不明";

            const item = document.createElement("div");
            item.className = "p-voting__item p-voting__item--odds";
            item.innerHTML = `
              <div class="p-voting__info">
                <div class="p-voting__combo-names">
                  <span class="p-voting__tag">3連複</span>
                  <div class="p-voting__horse-group" style="display:flex; flex-direction:column; gap:4px;">
                    <span class="p-voting__name">${names[0]} <small style="color:#666;">(${user0})</small></span>
                    <span class="p-voting__name">${names[1]} <small style="color:#666;">(${user1})</small></span>
                    <span class="p-voting__name">${names[2]} <small style="color:#666;">(${user2})</small></span>
                  </div>
                </div>
                <div class="p-voting__stats">
                  <span class="p-voting__votes">${c.v} 票</span>
                </div>
              </div>
              <div class="p-voting__odds-display">
                <span class="p-voting__label">オッズ</span>
                <span class="p-voting__number">${odds.toFixed(1)}</span>
              </div>
            `;
            oddsListDiv.appendChild(item);
          });

          updateChart();
        };

        // --- イベント登録 ---
        sortAscBtn.onclick = () => {
          currentSortOrder = "asc";
          sortAscBtn.classList.add("is-active");
          sortDescBtn.classList.remove("is-active");
          render(getFilteredAndSortedData(currentSortOrder));
        };

        sortDescBtn.onclick = () => {
          currentSortOrder = "desc";
          sortDescBtn.classList.add("is-active");
          sortAscBtn.classList.remove("is-active");
          render(getFilteredAndSortedData(currentSortOrder));
        };

        searchInput.oninput = () => {
          render(getFilteredAndSortedData(currentSortOrder));
        };

        // 初期化
        sortAscBtn.classList.add("is-active");

        // --- Firebase 監視 ---
        onValue(ref(db, "horses"), (snapshot) => {
          const data = snapshot.val();
          horseToUserMap = {};
          if (data) {
            for (let id in data) {
              horseToUserMap[data[id].horseName] = data[id].userName;
            }
          }
          if (allCombos.length > 0) render(getFilteredAndSortedData(currentSortOrder));
        });

        onValue(
          ref(db, "combos"),
          (snapshot) => {
            const data = snapshot.val();
            if (!data) {
              oddsListDiv.innerHTML = "<p class='p-voting__loading'>まだ投票データがありません。</p>";
              totalInfoDiv.innerText = "総投票数: 0 票";
              return;
            }

            totalVotes = 0;
            allCombos = [];
            for (let id in data) {
              const v = data[id].votes || 0;
              totalVotes += v;
              allCombos.push({ id, ...data[id], v });
            }

            totalInfoDiv.innerText = `総投票数: ${totalVotes} 票`;
            render(getFilteredAndSortedData(currentSortOrder));
          },
          (error) => {
            console.error("Firebase Read Error:", error);
            oddsListDiv.innerHTML = `<p class='p-voting__loading' style='color:red;'>接続エラー</p>`;
          },
        );
      }
    </script>
  </body>
</html>
