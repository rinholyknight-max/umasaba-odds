<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>リアルタイムオッズ - うまさば</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* ボタン周りのレイアウト調整 */
      .p-voting__controls {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .p-voting__controls .c-button {
        flex: 1;
        padding: 8px;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">リアルタイムオッズ</span>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <ul class="l-menu__list">
        <li class="l-menu__item"><a href="index.html" class="l-menu__link">投票画面</a></li>
        <li class="l-menu__item"><a href="odds.html" class="l-menu__link">オッズ確認</a></li>
        <li class="l-menu__item"><a href="admin.html" class="l-menu__link">管理者画面</a></li>
        <li class="l-menu__item"><button id="js-logout" class="l-menu__link">ログアウト</button></li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-voting">
      <h1 class="p-voting__title">現在のオッズ推移</h1>

      <div class="p-voting__controls">
        <button id="sort-asc" class="c-button c-button--secondary">人気順 ↓</button>
        <button id="sort-desc" class="c-button c-button--secondary">大穴順 ↑</button>
      </div>

      <div id="odds-list" class="p-voting__list">データ集計中...</div>
      <div id="total-info" class="p-voting__total"></div>
    </main>

    <script type="module">
      import { checkAuth, logout } from "./js/auth.js";
      import { initMenu } from "./js/menu.js";
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

      if (checkAuth()) {
        initMenu();
        document.getElementById("js-logout").onclick = logout;

        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "umasaba-odds.firebaseapp.com",
          databaseURL: "https://umasaba-odds-default-rtdb.firebaseio.com",
          projectId: "umasaba-odds",
          storageBucket: "umasaba-odds.appspot.com",
          messagingSenderId: "YOUR_ID",
          appId: "YOUR_APP_ID",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const oddsListDiv = document.getElementById("odds-list");
        const totalInfoDiv = document.getElementById("total-info");

        // Firebaseからデータ取得
        onValue(ref(db, "horses"), (snapshot) => {
          const data = snapshot.val();

          if (!data) {
            oddsListDiv.innerHTML = "<p class='p-voting__loading'>データがありません。</p>";
            return;
          }

          // 1. データを配列に変換し、総投票数を計算
          let totalVotes = 0;
          const horseArray = [];
          for (let id in data) {
            const v = data[id].votes || 0;
            totalVotes += v;
            horseArray.push({ id, ...data[id], v });
          }

          totalInfoDiv.innerText = `総投票数: ${totalVotes} 票`;

          // 2. 描画用関数（再利用できるように定義）
          const render = (arr) => {
            oddsListDiv.innerHTML = "";
            arr.forEach((h) => {
              let odds = 99.9;
              if (h.v > 0) {
                odds = Math.floor((totalVotes / h.v) * 10) / 10;
              }

              const item = document.createElement("div");
              item.className = "p-voting__item p-voting__item--odds";
              item.innerHTML = `
                  <div class="p-voting__info">
                      <div class="p-voting__text-group">
                          <span class="p-voting__name" title="${h.horseName}">${h.horseName}</span>
                          <span class="p-voting__user">トレーナー: ${h.userName}</span>
                      </div>
                      <div class="p-voting__stats">
                          <span class="p-voting__votes">${h.v} 票</span>
                      </div>
                  </div>
                  <div class="p-voting__odds-display">
                      <span class="p-voting__label">オッズ</span>
                      <span class="p-voting__number">${odds.toFixed(1)}</span>
                  </div>
              `;
              oddsListDiv.appendChild(item);
            });
          };

          // 3. 各ボタンのクリックイベント設定
          document.getElementById("sort-asc").onclick = () => {
            // 票数が多い順 = オッズが低い順（人気順）
            const sorted = [...horseArray].sort((a, b) => b.v - a.v);
            render(sorted);
          };

          document.getElementById("sort-desc").onclick = () => {
            // 票数が少ない順 = オッズが高い順（大穴順）
            const sorted = [...horseArray].sort((a, b) => a.v - b.v);
            render(sorted);
          };

          // 4. 初期表示（人気順）
          const defaultSort = [...horseArray].sort((a, b) => b.v - a.v);
          render(defaultSort);
        });
      }
    </script>
  </body>
</html>
