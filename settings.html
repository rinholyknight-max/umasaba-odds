<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>設定変更 - うまさば</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">設定変更</span>
        <button id="js-dark-mode-toggle" class="l-header__theme-toggle" aria-label="テーマ切り替え">
          <span class="material-symbols-outlined icon-sun">toggle_off</span>
          <span class="material-symbols-outlined icon-moon">toggle_on</span>
        </button>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <div class="l-menu__user-box">
        <div class="l-menu__user-icon">
          <span class="material-symbols-outlined">account_circle</span>
        </div>
        <div class="l-menu__user-info">
          <p class="l-menu__user-label">ログインユーザー</p>
          <span id="js-display-user" class="l-menu__user-name"></span>
        </div>
      </div>

      <ul class="l-menu__list">
        <li class="l-menu__item">
          <a href="index.html" class="l-menu__link"><span class="material-symbols-outlined">how_to_vote</span>投票画面</a>
        </li>
        <li class="l-menu__item">
          <a href="odds.html" class="l-menu__link"><span class="material-symbols-outlined">leaderboard</span>オッズ確認</a>
        </li>
        <li class="l-menu__item">
          <a href="settings.html" class="l-menu__link"><span class="material-symbols-outlined">settings</span>設定変更</a>
        </li>
        <li class="l-menu__item">
          <a href="admin.html" class="l-menu__link"><span class="material-symbols-outlined">admin_panel_settings</span>管理者画面</a>
        </li>
        <li class="l-menu__item">
          <button id="js-logout" class="l-menu__link"><span class="material-symbols-outlined">logout</span>ログアウト</button>
        </li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-admin">
      <h1 class="p-admin__title">プロフィール設定</h1>

      <section class="p-admin__register">
        <div class="p-settings__icon-section" style="text-align: center; margin-bottom: 25px">
          <div class="p-settings__icon-viewer" style="position: relative; display: inline-block">
            <div id="js-icon-preview" class="p-settings__icon-preview l-menu__user-icon" style="width: 150px; height: 150px; font-size: 100px; margin: 0 auto; overflow: hidden; border-radius: 50%; border: 3px solid var(--color-primary); display: flex; align-items: center; justify-content: center; background: var(--color-bg-sub)">
              <span class="material-symbols-outlined" style="font-size: 100px; color: var(--color-text-sub)">account_circle</span>
            </div>

            <label for="js-icon-upload" class="p-settings__icon-label" style="position: absolute; bottom: 5px; right: 5px; background: var(--color-primary); color: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); border: 2px solid white">
              <span class="material-symbols-outlined" style="font-size: 24px">photo_camera</span>
            </label>

            <input type="file" id="js-icon-upload" accept="image/png, image/jpeg, image/gif" style="display: none" />
          </div>
          <p style="font-size: 0.85rem; color: var(--color-text-sub); margin-top: 10px; font-weight: bold">タップしてアイコンを変更</p>
        </div>

        <div style="margin-bottom: 20px">
          <label style="display: block; font-size: 0.8rem; margin-bottom: 5px">表示名</label>
          <input type="text" id="js-display-name" class="c-input" placeholder="名前を入力" maxlength="15" autocomplete="off" />
        </div>
        <div style="margin-bottom: 20px">
          <label style="display: block; font-size: 0.8rem; margin-bottom: 5px">デフォルト賭け金（pt）</label>
          <input type="number" id="js-default-stake" class="c-input" inputmode="numeric" placeholder="1000" />
        </div>
        <button id="js-save-settings" class="c-button c-button--primary" style="width: 100%">設定を保存する</button>
        <p id="js-status-msg" style="margin-top: 15px; font-size: 0.85rem; text-align: center"></p>
      </section>
    </main>

    <div id="js-crop-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 9999; align-items: center; justify-content: center; flex-direction: column">
      <div style="width: 95%; max-width: 450px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5)">
        <h3 style="margin-top: 0; color: #333; text-align: center; font-size: 1.1rem">アイコンを切り抜く</h3>
        <div style="max-height: 60vh; margin-bottom: 20px; background: #eee; overflow: hidden">
          <img id="js-crop-image" style="max-width: 100%; display: block" />
        </div>
        <div style="display: flex; gap: 10px">
          <button id="js-crop-cancel" style="flex: 1; padding: 12px; border: none; border-radius: 6px; background: #ccc; color: #333; cursor: pointer; font-weight: bold">キャンセル</button>
          <button id="js-crop-confirm" style="flex: 1; padding: 12px; border: none; border-radius: 6px; background: var(--color-primary); color: white; cursor: pointer; font-weight: bold">この位置で確定</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initSettings } from "./js/settings.js";
      initSettings();
    </script>
  </body>
</html>
