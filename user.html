<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>設定変更 - うまさば</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.3/dist/heic2any.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo" id="js-header-title">個人ページ</span>
        <button id="js-page-info" class="l-header__info-btn" aria-label="ページ説明">
          <span class="material-symbols-outlined">info</span>
        </button>
        <button id="js-dark-mode-toggle" class="l-header__theme-toggle" aria-label="テーマ切り替え">
          <span class="material-symbols-outlined icon-sun">toggle_off</span>
          <span class="material-symbols-outlined icon-moon">toggle_on</span>
        </button>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <div class="l-menu__user-box">
        <div class="l-menu__user-icon">
          <span class="material-symbols-outlined">account_circle</span>
        </div>
        <div class="l-menu__user-info">
          <p class="l-menu__user-label">ログインユーザー</p>
          <span id="js-display-user" class="l-menu__user-name"></span>
        </div>
      </div>

      <ul class="l-menu__list">
        <li class="l-menu__item">
          <a href="index.html" class="l-menu__link"><span class="material-symbols-outlined">how_to_vote</span>投票画面</a>
        </li>
        <li class="l-menu__item">
          <a href="odds.html" class="l-menu__link"><span class="material-symbols-outlined">leaderboard</span>オッズ確認</a>
        </li>
        <li class="l-menu__item">
          <a href="settings.html" class="l-menu__link"><span class="material-symbols-outlined">settings</span>設定変更</a>
        </li>
        <li class="l-menu__item">
          <a href="admin.html" class="l-menu__link"><span class="material-symbols-outlined">admin_panel_settings</span>管理者画面</a>
        </li>
        <li class="l-menu__item">
          <button id="js-logout" class="l-menu__link"><span class="material-symbols-outlined">logout</span>ログアウト</button>
        </li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-main">
      <div class="p-user-profile">
        <div class="p-user-profile__header" id="js-user-bg">
          <div class="p-user-profile__visual-group">
            <div class="p-user-profile__icon-wrap">
              <div id="js-user-icon" class="p-user-profile__icon"></div>
            </div>

            <div class="p-user-profile__status">
              <p id="js-user-comment" class="p-user-profile__comment"></p>
            </div>
          </div>
        </div>

        <div class="p-user-profile__body">
          <h2 id="js-user-name" class="p-user-profile__name">読み込み中...</h2>
          <p id="js-user-circle" class="p-user-profile__circle"></p>

          <div class="p-user-profile__info-list">
            <div class="p-user-profile__info-item">
              <span class="p-user-profile__label">推しウマ娘</span>
              <span id="js-user-oshi" class="p-user-profile__value">-</span>
            </div>
          </div>

          <div id="js-stats-area" class="p-user-profile__stats"></div>
        </div>
      </div>

      <section class="p-user__history">
        <h2 class="p-user__sub-title">最近の投票履歴</h2>
        <div id="js-history-list" class="p-user__history-list"></div>
      </section>
    </main>

    <div id="js-modal" class="c-modal">
      <div id="js-modal-overlay" class="c-modal__overlay"></div>
      <div class="c-modal__content">
        <div class="c-modal__header">
          <h2 id="js-modal-title" class="c-modal__title"></h2>
          <button id="js-modal-close" class="c-modal__close">×</button>
        </div>
        <div id="js-modal-comment-list" class="c-modal__body"></div>
      </div>
    </div>

    <script type="module" src="js/user.js"></script>
  </body>
</html>
