<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>設定変更 - うまさば</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body class="l-page-container">
    <header class="l-header">
      <div class="l-header__inner">
        <button class="l-header__hamburger" id="js-hamburger"><span></span><span></span><span></span></button>
        <span class="l-header__logo">設定変更</span>
        <button id="js-dark-mode-toggle" class="l-header__theme-toggle" aria-label="テーマ切り替え">
          <span class="material-symbols-outlined icon-sun">toggle_off</span>
          <span class="material-symbols-outlined icon-moon">toggle_on</span>
        </button>
      </div>
    </header>

    <nav class="l-menu" id="js-menu">
      <div class="l-menu__user-box">
        <div class="l-menu__user-icon">
          <span class="material-symbols-outlined">account_circle</span>
        </div>
        <div class="l-menu__user-info">
          <p class="l-menu__user-label">ログインユーザー</p>
          <span id="js-display-user" class="l-menu__user-name"></span>
        </div>
      </div>

      <ul class="l-menu__list">
        <li class="l-menu__item">
          <a href="index.html" class="l-menu__link"><span class="material-symbols-outlined">how_to_vote</span>投票画面</a>
        </li>
        <li class="l-menu__item">
          <a href="odds.html" class="l-menu__link"><span class="material-symbols-outlined">leaderboard</span>オッズ確認</a>
        </li>
        <li class="l-menu__item">
          <a href="settings.html" class="l-menu__link"><span class="material-symbols-outlined">settings</span>設定変更</a>
        </li>
        <li class="l-menu__item">
          <a href="admin.html" class="l-menu__link"><span class="material-symbols-outlined">admin_panel_settings</span>管理者画面</a>
        </li>
        <li class="l-menu__item">
          <button id="js-logout" class="l-menu__link"><span class="material-symbols-outlined">logout</span>ログアウト</button>
        </li>
      </ul>
    </nav>
    <div class="l-menu__overlay" id="js-overlay"></div>

    <main class="p-main">
      <div class="p-user-profile">
        <div class="p-user-profile__header" id="js-user-bg" style="height: 120px; background: var(--color-bg-sub); position: relative">
          <div class="p-user-profile__icon-wrap" style="position: absolute; bottom: -40px; left: 20px">
            <div id="js-user-icon" class="p-user-profile__icon" style="width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--color-bg); overflow: hidden; background: #eee"></div>
          </div>
        </div>

        <div class="p-user-profile__body" style="padding: 50px 20px 20px">
          <h2 id="js-user-name" class="p-user-profile__name" style="font-size: 1.4rem; margin-bottom: 4px">読み込み中...</h2>
          <p id="js-user-circle" class="p-user-profile__circle" style="font-size: 0.9rem; color: var(--color-primary); font-weight: bold; margin-bottom: 15px"></p>

          <div class="p-user-profile__status" style="background: var(--color-bg-sub); padding: 15px; border-radius: 8px; margin-bottom: 20px">
            <p id="js-user-comment" class="p-user-profile__comment" style="font-size: 0.95rem; line-height: 1.5"></p>
          </div>

          <div class="p-user-profile__info-list">
            <div class="p-user-profile__info-item" style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border)">
              <span style="color: #888">推しウマ娘</span>
              <span id="js-user-oshi" style="font-weight: bold">-</span>
            </div>
          </div>

          <div id="js-stats-area" style="margin-top: 30px"></div>
        </div>
      </div>
    </main>

    <script type="module" src="js/user.js"></script>
  </body>
</html>
